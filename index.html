<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>gloam.sh</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0a0610;
            --bg-surface: #120e1a;
            --bg-card: #1a1228;
            --purple: #b48ead;
            --purple-dim: #7b6890;
            --lavender: #d4bfff;
            --red: #e05565;
            --red-glow: #ff6b7a;
            --white: #e8e0f0;
            --white-dim: #9a90a8;
            --orange: #ff7f2a;
            --gold: #ffeb93;
        }

        body {
            background: var(--bg-deep);
            color: var(--white);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .ambient::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(180, 142, 173, 0.06) 0%, transparent 70%);
            animation: drift 20s ease-in-out infinite;
        }

        .ambient::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(224, 85, 101, 0.04) 0%, transparent 70%);
            animation: drift 25s ease-in-out infinite reverse;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, -3%) scale(1.05); }
            66% { transform: translate(-3%, 5%) scale(0.95); }
        }

        /* Stars - canvas based */
        canvas#starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Layout */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Logo */
        .logo-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 2rem;
        }

        .logo-wrap svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(180, 142, 173, 0.2));
            transition: filter 0.6s ease;
        }

        .logo-wrap:hover svg {
            filter: drop-shadow(0 0 50px rgba(180, 142, 173, 0.4))
                    drop-shadow(0 0 80px rgba(224, 85, 101, 0.15));
        }

        .logo-ring {
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(180, 142, 173, 0.1);
            border-radius: 50%;
            animation: spin 30s linear infinite;
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--purple);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--purple);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Typography */
        .title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, var(--white) 0%, var(--lavender) 50%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title span { font-weight: 600; }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--white-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .subtitle .accent { color: var(--red); }

        /* Terminal card */
        .terminal {
            background: var(--bg-card);
            border: 1px solid rgba(180, 142, 173, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 480px;
            width: 100%;
            margin-bottom: 3rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.8;
            backdrop-filter: blur(20px);
        }

        .terminal-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(180, 142, 173, 0.08);
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-dot:nth-child(1) { background: var(--red); opacity: 0.7; }
        .terminal-dot:nth-child(2) { background: var(--gold); opacity: 0.7; }
        .terminal-dot:nth-child(3) { background: #a3be8c; opacity: 0.7; }

        .prompt { color: var(--purple); }
        .cmd { color: var(--white); }
        .flag { color: var(--red); }
        .arg { color: var(--gold); }
        .comment { color: var(--purple-dim); }
        .output { color: var(--white-dim); }

        /* Links */
        .links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .links a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--white-dim);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(180, 142, 173, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(26, 18, 40, 0.5);
        }

        .links a:hover {
            color: var(--white);
            border-color: var(--purple);
            background: rgba(180, 142, 173, 0.05);
            box-shadow: 0 0 20px rgba(180, 142, 173, 0.1);
            transform: translateY(-1px);
        }

        .links a svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Projects section */
        .projects {
            width: 100%;
            max-width: 700px;
            padding: 6rem 0 4rem;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--purple-dim);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(180, 142, 173, 0.15), transparent);
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid rgba(180, 142, 173, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .project-card:hover {
            border-color: rgba(180, 142, 173, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .project-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .project-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--white);
        }

        .project-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            background: rgba(180, 142, 173, 0.1);
            color: var(--purple);
        }

        .project-tag.ai {
            background: rgba(224, 85, 101, 0.1);
            color: var(--red);
        }

        .project-desc {
            font-size: 0.82rem;
            color: var(--white-dim);
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .project-meta {
            display: flex;
            gap: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--purple-dim);
        }

        .project-meta span { display: flex; align-items: center; gap: 0.3rem; }

        .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
        .dot.rust { background: #e9c46a; }
        .dot.go { background: #81c8be; }
        .dot.python { background: #a3be8c; }

        /* AI transparency badge */
        .ai-notice {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--purple-dim);
            text-align: center;
            padding: 1rem;
            margin-top: 1rem;
            border-top: 1px solid rgba(180, 142, 173, 0.06);
            line-height: 1.6;
        }

        .ai-notice a {
            color: var(--purple);
            text-decoration: none;
        }

        .ai-notice a:hover { text-decoration: underline; }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            padding: 2rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--purple-dim);
        }

        /* Cursor blink */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--purple);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Scroll hint */
        .scroll-hint {
            margin-top: 3rem;
            animation: bob 2s ease-in-out infinite;
            color: var(--purple-dim);
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .scroll-hint svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--purple-dim);
            stroke-width: 2;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(6px); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .terminal { font-size: 0.72rem; padding: 1.2rem; }
            .links { gap: 0.75rem; }
            .links a { font-size: 0.72rem; padding: 0.5rem 1rem; }
            .projects { padding: 3rem 0 2rem; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="container">
        <section class="hero">

    <script>
        // Canvas starfield - much smoother than DOM
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Star {
            constructor() {
                this.reset();
                this.phase = Math.random() * Math.PI * 2;
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.maxAlpha = Math.random() * 0.6 + 0.1;
                this.speed = Math.random() * 0.3 + 0.1;
                this.phase = Math.random() * Math.PI * 2;
                // Some stars have color
                const r = Math.random();
                if (r > 0.92) {
                    this.color = [212, 191, 255]; // lavender
                } else if (r > 0.88) {
                    this.color = [255, 127, 42];  // orange (like the logo)
                } else if (r > 0.85) {
                    this.color = [224, 85, 101];  // red
                } else {
                    this.color = [232, 224, 240]; // white
                }
            }

            update(t) {
                this.alpha = (Math.sin(t * this.speed + this.phase) + 1) / 2 * this.maxAlpha;
            }

            draw() {
                const [r, g, b] = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
                ctx.fill();

                // Glow on brighter stars
                if (this.size > 1.5 && this.alpha > 0.3) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha * 0.15})`;
                    ctx.fill();
                }
            }
        }

        const stars = Array.from({ length: 150 }, () => new Star());

        // Occasional shooting star
        let shootingStar = null;

        function maybeShootingStar() {
            if (Math.random() < 0.003 && !shootingStar) {
                shootingStar = {
                    x: Math.random() * canvas.width * 0.8,
                    y: Math.random() * canvas.height * 0.3,
                    vx: 4 + Math.random() * 4,
                    vy: 2 + Math.random() * 2,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.01,
                    length: 40 + Math.random() * 30,
                };
            }
        }

        function drawShootingStar() {
            if (!shootingStar) return;
            const s = shootingStar;
            s.x += s.vx;
            s.y += s.vy;
            s.life -= s.decay;

            if (s.life <= 0) { shootingStar = null; return; }

            const gradient = ctx.createLinearGradient(
                s.x, s.y, s.x - s.vx * s.length / 4, s.y - s.vy * s.length / 4
            );
            gradient.addColorStop(0, `rgba(232, 224, 240, ${s.life * 0.8})`);
            gradient.addColorStop(0.3, `rgba(180, 142, 173, ${s.life * 0.4})`);
            gradient.addColorStop(1, 'rgba(180, 142, 173, 0)');

            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.vx * s.length / 4, s.y - s.vy * s.length / 4);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Head glow
            ctx.beginPath();
            ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${s.life * 0.9})`;
            ctx.fill();
        }

        function animate(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const time = t * 0.001;

            stars.forEach(star => {
                star.update(time);
                star.draw();
            });

            maybeShootingStar();
            drawShootingStar();

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
